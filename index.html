<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Style Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #fafafa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .chat-container {
        width: 420px;
        height: 90vh;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .chat-header {
        padding: 15px;
        font-weight: bold;
        border-bottom: 1px solid #eee;
        text-align: center;
        background: #fff;
    }

    .chat-box {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background-color: #f5f5f5;
    }

    .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        word-wrap: break-word;
        display: flex;
        flex-direction: column;
    }

    .me {
        align-self: flex-end;
        background: #3797F0;
        color: white;
        border-bottom-right-radius: 5px;
    }

    .other {
        align-self: flex-start;
        background: #e4e6eb;
        color: black;
        border-bottom-left-radius: 5px;
    }

    .meta {
        font-size: 10px;
        margin-bottom: 4px;
        opacity: 0.8;
    }

    .me .meta {
        color: rgba(255,255,255,0.8);
    }

    .other .meta {
        color: #555;
    }

    /* Scrollbar */
    .chat-box::-webkit-scrollbar {
        width: 5px;
    }

    .chat-box::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
    }
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">Reva 💬</div>
    <div class="chat-box" id="chatBox"></div>
</div>

<script>
fetch("chat.txt")
.then(response => response.text())
.then(data => {

    const chatBox = document.getElementById("chatBox");
    const lines = data.split("\n");

    lines.forEach(line => {
        if(line.trim() === "") return;

        // Expected format:
        // 3/2/26, 9:36 PM - Rounak Swarnam: message

        const parts = line.split(" - ");
        if(parts.length < 2) return;

        const datetime = parts[0].trim();
        const rest = parts[1];

        const senderSplit = rest.split(": ");
        if(senderSplit.length < 2) return;

        const sender = senderSplit[0].trim();
        const message = senderSplit.slice(1).join(": ").trim();

        const messageDiv = document.createElement("div");
        messageDiv.classList.add("message");

        if(sender.toLowerCase().includes("rounak")) {
            messageDiv.classList.add("me");
        } else {
            messageDiv.classList.add("other");
        }

        const metaDiv = document.createElement("div");
        metaDiv.classList.add("meta");
        metaDiv.innerText = sender + " • " + datetime;

        const textDiv = document.createElement("div");
        textDiv.innerText = message;

        messageDiv.appendChild(metaDiv);
        messageDiv.appendChild(textDiv);

        chatBox.appendChild(messageDiv);
    });
    
    // Scroll to top after rendering
    chatBox.scrollTop = 0;
})
.catch(err => {
    console.error("Error loading chat.txt:", err);
});
</script>

</body>
</html>
